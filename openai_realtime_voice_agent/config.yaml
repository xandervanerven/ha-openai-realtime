name: OpenAI Realtime 2 Voice Agent (dev)
version: "0.6.1"
slug: openai_realtime_voice_agent_dev
description: Talk to your home with OpenAI gpt-realtime-2 — a voice agent for the Home Assistant Voice PE, with live device control and web search.
url: https://github.com/xandervanerven/ha-openai-realtime
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
host_network: true
# Gives the add-on SUPERVISOR_TOKEN so it can reach Home Assistant (used as a
# fallback auth token for the MCP server when longlived_token is left blank).
homeassistant_api: true

# ----------------------------------------------------------------------------
# Options are ORDERED for the Configuration tab (HA renders them in this order)
# and pseudo-grouped via name prefixes in translations/{en,nl}.yaml:
#   🔑 Basics → 🗣️ Model & voice → 💬 Conversation → 🌐 Web search → 🎚️ Audio
#   → 🏠 Home Assistant → ⚙️ Advanced → 🔍 Debug
# User-facing help lives in translations/, not here — keep comments dev-facing.
#
# REMOVED options (v0.4.29) — hardcoded to the only sane value; main.py keeps
# env fallbacks so absent vars are fine:
#   semantic_vad_create_response → true  (false breaks every multi-turn chat:
#     pipecat 0.0.97 only auto-creates the FIRST response, the 2nd turn hangs)
#   enable_disconnect_tool → false  (model could hang up mid-conversation)
#   interrupt_response → false  (handsfree barge-in shelved: the speaker→mic
#     echo leak made the VAD cut replies / squeal; firmware is barge_in:false)
#   device_input_sample_rate → 16000  (the Voice PE firmware always sends 16k)
# The server_vad escape hatch (turn_detection_type + vad_*) is KEPT but
# optional-without-default → hidden behind the UI's "Show unused optional
# configuration options" toggle on fresh installs. Same trick (v0.4.30) for
# the four *_custom escape-hatch fields: optional, no default, hidden until
# needed (the dropdown descriptions tell users how to reveal them).
# NB the add-on UI renders every string option as a SINGLE-LINE input — there
# is no multiline/textarea support in the frontend (verified in
# supervisor-app-config.ts), so long text like `instructions` is best edited
# via the Configuration tab's ⋮ → "Edit in YAML".
# ----------------------------------------------------------------------------
options:
  # --- 🔑 Basics ---
  openai_api_key: ""
  instructions: >-
    You are the cheerful, friendly voice assistant of Home Assistant and you
    control the smart home. LANGUAGE: Speak and understand only English, with a
    natural, neutral accent. Never switch language, not even for stray foreign
    words or an accent; do not infer the language from accent or a single word.
    STYLE: Your replies are read aloud, so keep them short and natural. Do not
    read out entity IDs, lists, or technical names; use ordinary names ("the
    bedroom lamp"). Call your tools silently — say nothing like "Okay, let me
    check" or "one moment" beforehand; just do it and then give one complete
    answer. Do not start every answer with "Okay"; vary your confirmation
    naturally, e.g. "The bedroom lamp is on now" or "Done, the light is off".
    BEHAVIOR: Carry out requested actions immediately with your tools and never
    guess. If you are unsure which device, room, or action is meant, ask a short
    clarifying question first. If something fails, briefly say what went wrong.
  transcription_language: ""

  # --- 🗣️ Model & voice ---
  # (*_custom fields have NO defaults: optional → hidden until revealed via
  # "Show unused optional configuration options" or set in YAML.)
  openai_model: "gpt-realtime-2"
  openai_voice: "marin"
  openai_speed: 1.0
  max_output_tokens: 0

  # --- 💬 Conversation ---
  follow_up_listen_seconds: 8
  # 700 (not 0/200): a reply tail that survives the device AEC and arrives
  # ALONE in the open follow-up mic becomes a ghost turn — verified live
  # 2026-06-12 23:18 at 300 ms: the reply's own i2s/DAC tail (~600 ms) leaked
  # into the fresh mic, the VAD committed it as an (empty) turn and the model
  # answered the previous question AGAIN. 700 covers the tail with margin.
  follow_up_open_delay_ms: 700
  # Same echo guard at the WAKE boundary: delay after the wake chime before the
  # mic opens. The chime's own i2s/DAC tail otherwise leaks into the fresh mic
  # and becomes a ghost turn (verified live 2026-06-12 23:27 — a wake produced
  # an unprompted answer). Was a hardcoded 400 ms in the firmware yaml; now sent
  # in `hello` so it's tunable like follow_up_open_delay_ms.
  wake_open_delay_ms: 700
  vad_eagerness: "low"
  phase_idle_debounce_ms: 1500

  # --- 🌐 Web search ---
  enable_web_search: true
  web_search_model: "gpt-5.5"

  # --- 🎚️ Audio ---
  # 150 (not 0): cushions WS jitter so the speaker doesn't run dry mid-word
  # (the start-of-reply crackle); costs 150 ms of reply latency.
  playback_prebuffer_ms: 150
  noise_reduction: "off"

  # --- 🏠 Home Assistant ---
  ha_mcp_url: ""
  longlived_token: ""
  mcp_tool_allowlist: ""

  # --- ⚙️ Advanced ---
  websocket_port: 8081  # dev add-on port (stable uses 8080)
  session_reuse_timeout_seconds: 300
  max_context_messages: 12
  transcription_model: "gpt-4o-transcribe"
  # (turn_detection_type + vad_* deliberately have NO defaults here — see the
  # header comment; semantic_vad is the hardwired default in main.py.)

  # --- 🔍 Debug ---
  enable_recording: false
  log_level: "DEBUG"  # dev-only option; the dev add-on defaults to DEBUG

schema:
  # --- 🔑 Basics ---
  openai_api_key: password
  instructions: str
  transcription_language: str?
  # --- 🗣️ Model & voice ---
  openai_model: "list(gpt-realtime-2|gpt-realtime-1.5|gpt-realtime-mini|gpt-realtime|custom)"
  openai_model_custom: str?
  openai_voice: "list(marin|cedar|alloy|ash|ballad|coral|echo|sage|shimmer|verse|custom)"
  openai_voice_custom: str?
  openai_speed: float(0.25,1.5)
  max_output_tokens: int(0,4096)
  # --- 💬 Conversation ---
  follow_up_listen_seconds: int(0,60)
  follow_up_open_delay_ms: int(0,5000)
  wake_open_delay_ms: int(0,5000)
  vad_eagerness: "list(low|medium|high|auto)"
  phase_idle_debounce_ms: int(0,10000)
  # --- 🌐 Web search ---
  enable_web_search: bool
  web_search_model: "list(gpt-5-nano|gpt-5.4-nano|gpt-5-mini|gpt-5.4-mini|gpt-5|gpt-5.4|gpt-5.5|custom)"
  web_search_model_custom: str?
  # --- 🎚️ Audio ---
  playback_prebuffer_ms: int(0,2000)
  noise_reduction: "list(off|near_field|far_field)"
  # --- 🏠 Home Assistant ---
  ha_mcp_url: str
  longlived_token: password
  mcp_tool_allowlist: str
  # --- ⚙️ Advanced ---
  websocket_port: int(1024,65535)
  session_reuse_timeout_seconds: int(0,3600)
  max_context_messages: int(0,100)
  transcription_model: "list(gpt-4o-transcribe|gpt-realtime-whisper|gpt-4o-mini-transcribe|whisper-1|custom)"
  transcription_model_custom: str?
  # Legacy server_vad escape hatch — optional, hidden until "Show unused
  # optional configuration options" is toggled (or a value is saved).
  turn_detection_type: "list(semantic_vad|server_vad)?"
  vad_threshold: "float(0,1)?"
  vad_prefix_padding_ms: int?
  vad_silence_duration_ms: int?
  # --- 🔍 Debug ---
  enable_recording: bool
  log_level: "list(DEBUG|INFO|WARNING)"
# No `image:` key -> Home Assistant builds the add-on locally from the
# Dockerfile in this directory (see build.yaml). This makes the fork work
# without publishing images to a registry. Advanced users who prefer fast
# installs can publish via the included GitHub Actions workflow and set:
#   image: ghcr.io/<your-gh-user>/ha-openai-realtime/openai-realtime-voice-agent-{arch}
