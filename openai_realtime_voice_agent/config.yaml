name: OpenAI Realtime Voice Agent
version: "0.4.14"
slug: openai_realtime_voice_agent
description: Voice control using OpenAI Realtime API with WebSocket support for ESP32 devices
url: https://github.com/fjfricke/ha-openai-realtime
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
host_network: true
# Gives the add-on SUPERVISOR_TOKEN so it can reach Home Assistant (used as a
# fallback auth token for the MCP server when longlived_token is left blank).
homeassistant_api: true
options:
  openai_api_key: ""
  # OpenAI Realtime model. Defaults to gpt-realtime-2 (this fork's target). If
  # the API rejects it, fall back to "gpt-realtime".
  openai_model: "gpt-realtime-2"
  openai_voice: "marin"
  websocket_port: 8080
  # PCM sample rate (Hz) the device microphone streams in. The Home Assistant
  # Voice PE firmware (va_client) sends 16000; the backend resamples to the
  # 24000 OpenAI requires. Only change if you flash a device that sends a
  # different rate.
  device_input_sample_rate: 16000
  # MCP server for Home Assistant control. For the unofficial homeassistant-ai/
  # ha-mcp server set its Streamable-HTTP endpoint, e.g.
  # "http://homeassistant.local:8086/mcp". Leave blank to use HA's built-in MCP
  # at http://supervisor/core/api/mcp.
  ha_mcp_url: ""
  # Long-lived Home Assistant access token for the MCP server. Leave blank to
  # use the add-on's supervisor token (built-in MCP only).
  longlived_token: ""
  # Optional comma-separated allow-list of MCP tool names to expose to the
  # model. ha-mcp ships 80+ tools; trimming the set keeps the realtime session
  # fast and focused. Leave blank to expose all tools.
  mcp_tool_allowlist: ""
  # Turn detection settings (server-side VAD). A higher threshold reduces false
  # barge-ins from speaker->mic echo when handsfree barge-in is enabled.
  vad_threshold: 0.5
  vad_prefix_padding_ms: 300
  # How long (ms) of silence ends your turn (server_vad only). 800 leaves room
  # to pause briefly without being cut off mid-sentence; raise toward 1000-1200
  # if it still cuts you off, lower it if responses feel sluggish.
  vad_silence_duration_ms: 800
  # Turn detection mode. Default "semantic_vad": detects a natural end-of-utterance
  # (doesn't cut you off on a pause), is echo-resistant, and — crucially — sets
  # create_response=False so ONLY the pipeline creates the response. That avoids
  # the server_vad double-response race ("conversation_already_has_active_response")
  # that cut replies short around tool calls. (The earlier semantic_vad
  # "only-first-turn" issue was the separate phase-delivery bug, now fixed.)
  # "server_vad" = classic silence-based detection tuned by the vad_* values above.
  turn_detection_type: "semantic_vad"
  # semantic_vad only: how eager to end the user's turn. "low" waits longest
  # (fewest mid-sentence cut-offs). low | medium | high | auto.
  vad_eagerness: "low"
  # semantic_vad only: who creates the OpenAI response each turn. TRUE (default)
  # = the SERVER creates a response on every detected end-of-turn. REQUIRED for
  # multi-turn: Pipecat 0.0.97 only auto-creates the FIRST turn's response (and
  # post-tool), so with this false the 2nd/3rd question hangs forever in
  # "thinking" (turn 1 answers, then nothing). Leave true unless you specifically
  # want single-turn-only behaviour.
  semantic_vad_create_response: true
  # Expose the `disconnect_client` tool to the model. FALSE (default): the Voice
  # PE manages its own session (wake word + no-speech watchdog), so a model
  # disconnect just tears down the WebSocket mid-conversation — it was caught
  # closing the socket during the very first reply. Only enable if your device
  # depends on the backend to hang up.
  enable_disconnect_tool: false
  # Allow user speech to interrupt the assistant mid-reply (handsfree barge-in).
  # Default false: with imperfect device-side echo cancellation, the bot's own
  # audio can be heard as "speech" and cut the reply short. Interrupt with the
  # "stop" wake word / center button instead. Set true to try handsfree talk-over.
  interrupt_response: false
  # Pin the language (ISO code, e.g. "nl" for Dutch). Empty = auto-detect.
  # Stops the model drifting to another language; pair with a language lock in
  # `instructions`. (Transcription is only enabled when this is set.)
  transcription_language: ""
  # Model that transcribes your speech to TEXT (the transcript in the logs +
  # context). NOTE: this is NOT what gpt-realtime understands you with — the main
  # model hears the audio natively; this is only the side-channel transcript.
  # Options: "gpt-4o-transcribe" (default, accurate), "gpt-4o-mini-transcribe"
  # (cheaper), "whisper-1" (older), "gpt-realtime-whisper" (new streaming STT for
  # the Realtime API — faster/cheaper, try it if you like). Only used when
  # transcription_language is set.
  transcription_model: "gpt-4o-transcribe"
  # Milliseconds the bot must stay silent after a reply before the device
  # returns to idle. Bridges the gaps between TTS sentences / tool-calls so the
  # LED ring and the "stop" wake word stay active for the whole answer.
  phase_idle_debounce_ms: 1500
  # Seconds the device keeps the mic OPEN after the assistant finishes, so you
  # can answer back WITHOUT re-saying the wake word ("follow-up window"). The
  # LED ring turns to the listening colour while it waits; if you don't speak
  # within the window it returns to idle. 0 = off (turn-based: say the wake word
  # for every turn). The value is sent to the device in the handshake, so you
  # can tune it here and just restart the add-on — no reflash. Requires firmware
  # that supports it (va_client follow_up_ms); older firmware ignores it.
  follow_up_listen_seconds: 8
  # Milliseconds the device waits AFTER a reply has finished playing before it
  # opens the follow-up mic (above). This bridges the speaker's hardware tail
  # (i2s buffer + DAC) so the mic doesn't catch the very end of the assistant's
  # own speech and false-trigger. Lower = the listening ring appears sooner /
  # snappier; raise it if, after a reply, the device starts "hearing itself"
  # (a spurious turn) or echoes. 200 is a good start; try 0 only if your audio
  # tail is truly gone by the time the reply ends. Sent in the handshake too.
  follow_up_open_delay_ms: 200
  # Playback jitter buffer (ms). The device holds incoming TTS audio until this
  # much has accumulated before it starts playing, giving the audio pipeline a
  # cushion so brief network hiccups don't make the speaker run dry mid-word
  # (the short "crackle"/glitch you sometimes hear). Higher = more robust against
  # stutter but adds this much latency before a reply starts; 0 = off (play
  # immediately). 150 is a good start; raise to 250-300 if you still hear
  # crackle. Sent in the handshake, so tune it and just restart the add-on.
  playback_prebuffer_ms: 150
  # OpenAI instructions. For non-English, lock the language explicitly, e.g.:
  #   "Je bent de Home Assistant spraakassistent en bestuurt het smart home.
  #    Spreek en versta UITSLUITEND Nederlands. Wissel nooit van taal."
  instructions: "You are the Home Assistant Voice Agent and can control the Smart Home."
  # Session management
  session_reuse_timeout_seconds: 300  # 5 Minuten (in Sekunden)
  # Audio recording (optional, for debugging)
  enable_recording: false
schema:
  openai_api_key: password
  openai_model: str
  openai_voice: str
  websocket_port: int(1024,65535)
  device_input_sample_rate: int(8000,48000)
  ha_mcp_url: str
  longlived_token: password
  mcp_tool_allowlist: str
  vad_threshold: float(0.0,1.0)
  vad_prefix_padding_ms: int
  vad_silence_duration_ms: int
  turn_detection_type: "list(semantic_vad|server_vad)"
  vad_eagerness: "list(low|medium|high|auto)"
  semantic_vad_create_response: bool
  enable_disconnect_tool: bool
  interrupt_response: bool
  transcription_language: str?
  transcription_model: str
  phase_idle_debounce_ms: int(0,10000)
  follow_up_listen_seconds: int(0,60)
  follow_up_open_delay_ms: int(0,5000)
  playback_prebuffer_ms: int(0,2000)
  instructions: str
  session_reuse_timeout_seconds: int(0,3600)  # bis 1 Stunde
  enable_recording: bool
# No `image:` key -> Home Assistant builds the add-on locally from the
# Dockerfile in this directory (see build.yaml). This makes the fork work
# without publishing images to a registry. Advanced users who prefer fast
# installs can publish via the included GitHub Actions workflow and set:
#   image: ghcr.io/<your-gh-user>/ha-openai-realtime/openai-realtime-voice-agent-{arch}
