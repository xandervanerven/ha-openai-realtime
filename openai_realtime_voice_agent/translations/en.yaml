configuration:
  openai_api_key:
    name: OpenAI API key
    description: >-
      Your OpenAI API key (starts with sk-...). Required. The add-on uses it to
      open the Realtime session that does all the speech + reasoning.
  openai_model:
    name: OpenAI model
    description: >-
      Realtime (speech-to-speech) model. gpt-realtime-2 = newest/recommended,
      gpt-realtime-1.5 = fast non-reasoning, gpt-realtime-mini = cost-efficient,
      gpt-realtime = older/legacy. Pick "custom" to type your own below.
  openai_model_custom:
    name: OpenAI model (custom)
    description: >-
      Only used when OpenAI model is set to "custom". Enter any valid Realtime
      model id.
  openai_voice:
    name: Assistant voice
    description: >-
      The voice the assistant speaks with. marin and cedar are the newest /
      recommended. Pick "custom" to type your own below. The voice is fixed once
      a session starts speaking.
  openai_voice_custom:
    name: Assistant voice (custom)
    description: >-
      Only used when Assistant voice is set to "custom". Enter any valid voice
      name.
  openai_speed:
    name: Voice speed
    description: >-
      Playback speed of the assistant's voice. 1.0 = normal, lower is slower
      (down to 0.25), higher is faster (up to 1.5). Post-processing only — it
      doesn't change what's said, just the pace.
  max_output_tokens:
    name: Max reply length (tokens)
    description: >-
      Cap the assistant's reply length in output tokens. 0 = unlimited. Set e.g.
      1024 to stop the occasional runaway monologue and bound per-reply token
      cost. Too low can cut answers off mid-sentence.
  noise_reduction:
    name: Input noise reduction
    description: >-
      Noise reduction applied to your speech before the turn-detection VAD. "off"
      (default), "near_field" for talking close to the device, "far_field" for
      across the room. May reduce false triggers; the device already does its own
      XMOS noise suppression, so the benefit varies — try it if the VAD misfires.
  websocket_port:
    name: WebSocket port
    description: >-
      Port the device connects to over plain WebSocket. Must match the URL
      flashed on the Voice PE (default 8080). Only change if it clashes.
  device_input_sample_rate:
    name: Device mic sample rate (Hz)
    description: >-
      Sample rate the device microphone streams at. The Voice PE firmware sends
      16000; the add-on resamples to the 24000 OpenAI needs. Only change if you
      flash a device that sends a different rate.
  ha_mcp_url:
    name: Home Assistant MCP URL
    description: >-
      Which MCP server handles Home Assistant control. OPTION A (recommended):
      leave BLANK to use HA's built-in "MCP Server" integration (small fixed set
      of Assist tools — HassTurnOn/Off, HassLightSet, etc. — scoped to your
      exposed entities; lowest token use). Requires the "Model Context Protocol
      Server" integration installed in HA + entities exposed to Assist. OPTION B:
      paste the homeassistant-ai/ha-mcp add-on's Streamable-HTTP URL (e.g.
      http://homeassistant.local:8086/mcp) for the full ha-mcp tool set.
  longlived_token:
    name: Home Assistant token
    description: >-
      Long-lived access token for the MCP server. OPTION A (built-in MCP): leave
      BLANK to use the add-on's own supervisor token — only set a token here if
      startup logs a 401/403 on /core/api/mcp. OPTION B (ha-mcp): fill in a
      long-lived token (create one at your HA profile page) if that add-on needs
      it.
  mcp_tool_allowlist:
    name: MCP tool allow-list
    description: >-
      Comma-separated list of MCP tool names to expose to the model; blank =
      expose all. OPTION A (built-in MCP): leave BLANK — it already ships a small
      focused set (and the tool names are Hass*, not ha_*). OPTION B (ha-mcp):
      ha-mcp ships 80+ tools, so trimming the set here keeps the session fast and
      cheap.
  vad_threshold:
    name: VAD threshold (server_vad)
    description: >-
      How loud speech must be to count as a turn (0.0–1.0). Higher = fewer false
      triggers from echo/noise. Only used when Turn detection = server_vad.
  vad_prefix_padding_ms:
    name: VAD prefix padding (ms)
    description: >-
      How much audio before detected speech to keep, so the first word isn't
      clipped (server_vad only).
  vad_silence_duration_ms:
    name: VAD silence to end turn (ms)
    description: >-
      How long a silence ends your turn (server_vad only). 800 leaves room to
      pause briefly; raise toward 1000–1200 if it cuts you off, lower if replies
      feel sluggish.
  turn_detection_type:
    name: Turn detection mode
    description: >-
      How the end of your turn is detected. "semantic_vad" (recommended) detects
      a natural end-of-utterance, is echo-resistant, and doesn't cut you off on a
      pause. "server_vad" is classic silence-based detection (uses the vad_*
      values).
  vad_eagerness:
    name: Semantic VAD eagerness
    description: >-
      semantic_vad only: how eager to end your turn. "low" waits longest (fewest
      mid-sentence cut-offs). low | medium | high | auto.
  semantic_vad_create_response:
    name: Server creates each response
    description: >-
      semantic_vad only. ON (recommended): the server replies on every detected
      end-of-turn — REQUIRED for multi-turn (with it off, the 2nd question hangs
      forever in "thinking"). Leave on unless you specifically want single-turn.
  enable_disconnect_tool:
    name: Allow model to hang up
    description: >-
      Expose the disconnect tool to the model. OFF (recommended): the Voice PE
      manages its own session, so a model-driven disconnect just tears down the
      connection mid-conversation. Only enable if your device relies on it.
  interrupt_response:
    name: Handsfree barge-in
    description: >-
      Let your speech interrupt the assistant mid-reply. OFF (recommended): with
      imperfect echo cancellation the bot's own audio can be heard as speech and
      cut the reply short. Interrupt with the "stop" word / center button instead.
  transcription_language:
    name: Transcription language
    description: >-
      Pin the language (ISO code, e.g. "nl"). Blank = auto-detect. Stops the
      model drifting between languages. NOTE: this also turns the user-speech
      transcript (the 🗣️ user line in the log) on/off.
  transcription_model:
    name: Transcription model
    description: >-
      Model that turns your speech into the side-channel TEXT transcript (NOT how
      the assistant understands you — it hears the audio natively). Only used when
      a transcription language is set. gpt-4o-transcribe (default, most accurate) /
      gpt-realtime-whisper (streaming) / gpt-4o-mini-transcribe (cheapest) /
      whisper-1 (legacy). Pick "custom" to type your own below.
  transcription_model_custom:
    name: Transcription model (custom)
    description: >-
      Only used when Transcription model is set to "custom". Enter any valid
      transcription model id.
  phase_idle_debounce_ms:
    name: Idle debounce (ms)
    description: >-
      How long the bot must stay silent after a reply before the device returns
      to idle. Bridges the gaps between TTS sentences / tool-calls so the LED ring
      and the "stop" word stay active for the whole answer.
  follow_up_listen_seconds:
    name: Follow-up listen window (s)
    description: >-
      Seconds the device keeps the mic open after the assistant finishes, so you
      can answer back WITHOUT re-saying the wake word. The ring turns to the
      listening colour while it waits. 0 = off (say the wake word every turn).
      Needs firmware that supports it.
  follow_up_open_delay_ms:
    name: Follow-up open delay (ms)
    description: >-
      Milliseconds the device waits after a reply finishes before opening that
      follow-up mic, bridging the speaker's hardware tail so it doesn't "hear
      itself". Lower = the listening ring appears sooner; raise it if the device
      starts hearing itself / echoes after a reply. 200 is a good start.
  playback_prebuffer_ms:
    name: Playback jitter buffer (ms)
    description: >-
      How much TTS audio the device buffers before it starts playing a reply.
      Cushions brief network hiccups so the speaker doesn't run dry mid-word (the
      short crackle/glitch you sometimes hear). Higher = more robust but adds
      this much latency before a reply starts. 150 is a good start; raise to
      250-300 if you still hear crackle, 0 to disable.
  instructions:
    name: System instructions
    description: >-
      The assistant's system prompt. For non-English, lock the language here,
      e.g. "Spreek en versta UITSLUITEND Nederlands. Wissel nooit van taal."
  session_reuse_timeout_seconds:
    name: Session reuse timeout (s)
    description: >-
      How long a disconnected client's conversation context is kept so a quick
      reconnect resumes the same session. 0–3600.
  max_context_messages:
    name: Max context messages
    description: >-
      How many recent conversation messages are restored into a session. gpt-realtime
      re-bills the whole conversation on every reply, so a long chat can hit OpenAI's
      tokens-per-minute limit ("Rate limit reached"). Capping this keeps each turn
      cheap while preserving recent context. 12 is a good default; lower if you still
      hit rate limits, 0 disables the cap.
  enable_web_search:
    name: Enable web search
    description: >-
      Let the assistant look things up online (weather, news, facts, opening
      hours, recent events). Off by default. When on, a web_search tool runs a
      secondary OpenAI Responses web_search call in the add-on and returns a
      short spoken answer — uses your existing OpenAI key, ~$0.016 per search on
      the default model. Adds ~1-3s while it searches (device shows "thinking").
  web_search_model:
    name: Web search model
    description: >-
      OpenAI model used for the web_search lookup. Ordered cheapest→best:
      nano (weakest at search) < mini < full. gpt-5.4-mini (default) is a good
      cost/quality midpoint. Pick "custom" to type your own below. If the model
      is rejected the assistant just says it couldn't search — no crash.
  web_search_model_custom:
    name: Web search model (custom)
    description: >-
      Only used when Web search model is set to "custom". Enter any model that
      supports the OpenAI Responses web_search tool.
  enable_recording:
    name: Record audio (debug)
    description: >-
      Save the input/output audio to files for debugging. Off by default.
network: {}
